# docker-compose.yml — Produzione / Demo (app + db)
# Uso: docker compose up -d --build

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hanna-stats-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: hanna_stats
      DB_PASSWORD: ${DB_PASSWORD:-HannaStats2026!}
      DB_NAME: hanna_statistics
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    container_name: hanna-stats-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpass2026}
      MARIADB_DATABASE: hanna_statistics
      MARIADB_USER: hanna_stats
      MARIADB_PASSWORD: ${DB_PASSWORD:-HannaStats2026!}
    volumes:
      - hanna_db_data:/var/lib/mysql
      - ../server/src/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hanna_db_data:
